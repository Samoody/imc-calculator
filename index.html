<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css">

  <style>
    #resultado {
      margin-top: 20px;
      font-weight: bold;
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Calculadora de IMC</h1>
<input type="text" id="nome" placeholder="Seu nome">
    <input type="number" id="peso" placeholder="Peso (kg) Ex: 70">
    <input type="number" id="altura" placeholder="Altura (m) Ex: 1.75" step="0.01">

    <button onclick="calcularIMC()">Calcular</button>
    <button onclick="limpar()">Limpar</button>

    <p id="resultado"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
