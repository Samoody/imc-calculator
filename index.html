<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVO (tem que ficar aqui dentro do head) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Calculadora de IMC</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <input type="number" id="idade" placeholder="Idade">

    <input type="number" id="peso" placeholder="Peso (kg) Ex: 70">

    <input type="number" id="altura" placeholder="Altura (m) Ex: 1.75" step="0.01">

    <p>Você faz academia?</p>

    <div class="botoes-academia">
      <button id="btn-sim" class="btn-academia" onclick="setAcademia('sim')">Sim</button>
      <button id="btn-nao" class="btn-academia" onclick="setAcademia('nao')">Não</button>
    </div>

    <div class="botoes-principais">
      <button onclick="calcularIMC()">Calcular</button>
      <button onclick="limpar()">Limpar</button>
      <button onclick="mostrarHistorico()">Histórico</button>
      <button onclick="limparHistorico()">Limpar Histórico</button>
    </div>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
